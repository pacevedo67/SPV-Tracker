<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — SPV Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-brand">
      <div class="logo-mark">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 11L5.5 7 8 9.5 12 4" stroke="#fff" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="auth-brand-text">SPV Tracker</span>
    </div>
    <div style="margin-bottom:28px;">
      <h1 id="form-title" style="font-size:20px;">Set new password</h1>
      <p style="margin-top:4px;font-size:13px;">Choose a strong password for your account.</p>
    </div>

    <div class="card">
      <div id="alert-box" style="display:none;"></div>

      <form id="reset-form">
        <div class="field">
          <label class="label" for="new-password">New Password</label>
          <input type="password" id="new-password" placeholder="••••••••" autocomplete="new-password" minlength="8" required>
        </div>
        <div class="field">
          <label class="label" for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password" minlength="8" required>
        </div>
        <div class="btn-row" style="margin-top:20px;">
          <button type="submit" class="btn btn-primary" style="width:100%;">Set password</button>
        </div>
      </form>

      <div id="success-msg" style="display:none;text-align:center;padding:12px 0;">
        <p style="font-size:14px;">Password updated. <a href="/" style="color:var(--primary);">Sign in →</a></p>
      </div>
    </div>
  </div>
</div>

<script>
  const alertBox = document.getElementById('alert-box');
  function showAlert(msg, type = 'error') {
    alertBox.className = `alert alert-${type}`;
    alertBox.textContent = msg;
    alertBox.style.display = 'block';
  }

  // Extract token from URL
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    showAlert('Invalid reset link. Please request a new one.');
    document.getElementById('reset-form').style.display = 'none';
  }

  document.getElementById('reset-form').addEventListener('submit', async e => {
    e.preventDefault();
    alertBox.style.display = 'none';
    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    if (newPassword !== confirmPassword) {
      showAlert('Passwords do not match.');
      return;
    }
    if (newPassword.length < 8) {
      showAlert('Password must be at least 8 characters.');
      return;
    }
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const res = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword }),
      });
      const data = await res.json();
      if (!res.ok) {
        showAlert(data.error);
        btn.disabled = false; btn.textContent = 'Set password';
        return;
      }
      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
      // Auto-redirect to dashboard after successful reset (already logged in via cookie)
      setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
    } catch {
      showAlert('Network error');
      btn.disabled = false; btn.textContent = 'Set password';
    }
  });
</script>
</body>
</html>
