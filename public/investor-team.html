<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Designees — SPV Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
  <div class="site-header-inner">
    <a href="/investor-dashboard.html" class="site-logo">
      <div class="logo-mark">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 11L5.5 7 8 9.5 12 4" stroke="#fff" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      SPV Tracker
    </a>
    <nav class="site-nav">
      <a href="/investor-dashboard.html">Dashboard</a>
      <a href="/investor-profile.html">Profile</a>
      <a href="/investor-certifications.html">Certifications</a>
      <span id="user-name" style="font-size:13px;color:var(--text-muted);"></span>
      <button id="logout-btn">Sign out</button>
    </nav>
  </div>
</header>

<div class="page-wide">
  <div style="margin-bottom:32px;">
    <p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:6px;">
      Investor Team
    </p>
    <h1 style="margin:0;">Designees</h1>
    <p style="margin-top:4px;font-size:13px;color:var(--text-muted);">
      Designees can fill out and sign questionnaires on behalf of this account.
    </p>
  </div>

  <div id="alert-global" style="display:none;" class="alert"></div>

  <div class="card" style="margin-bottom:24px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <h3 style="margin-bottom:0;">Account Members</h3>
      <button class="btn btn-outline" id="show-add-btn">+ Add Designee</button>
    </div>

    <div id="add-form" style="display:none;border:1px solid var(--border);border-radius:5px;padding:24px;margin-bottom:20px;background:var(--bg);">
      <h3 style="margin-bottom:16px;">Add Designee</h3>
      <div id="add-alert" style="display:none;" class="alert"></div>
      <div class="field-row">
        <div class="field">
          <label class="label" for="nu-name">Full Name</label>
          <input type="text" id="nu-name" placeholder="Jane Smith">
        </div>
        <div class="field">
          <label class="label" for="nu-email">Email</label>
          <input type="email" id="nu-email" placeholder="jane@example.com">
        </div>
      </div>
      <div class="field" style="max-width:400px;">
        <label class="label" for="nu-password">Temporary Password</label>
        <input type="text" id="nu-password" placeholder="They can change it after signing in">
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="add-btn">Send Invite</button>
        <button class="btn btn-ghost" id="cancel-add-btn">Cancel</button>
      </div>
    </div>

    <div id="members-list"></div>
  </div>
</div>

<script>
  let me = null;
  let isAdmin = false;

  async function init() {
    try {
      const r = await fetch('/api/investor/me');
      if (!r.ok) { location.href = '/investor.html'; return; }
      const data = await r.json();
      me = data.user;
      isAdmin = me.role === 'admin';
    } catch { location.href = '/investor.html'; return; }

    document.getElementById('user-name').textContent = `${me.full_name} · ${me.role}`;

    if (!isAdmin) {
      document.getElementById('show-add-btn').style.display = 'none';
    }

    const r2 = await fetch('/api/investor/team');
    renderMembers(await r2.json());
  }

  function renderMembers(members) {
    const el = document.getElementById('members-list');
    if (!members.length) { el.innerHTML = '<p style="color:var(--text-muted);font-size:13px;">No members yet.</p>'; return; }
    el.innerHTML = `
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="border-bottom:1px solid var(--border);">
            <th style="text-align:left;padding:8px 0;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);">Name</th>
            <th style="text-align:left;padding:8px 0;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);">Email</th>
            <th style="text-align:left;padding:8px 0;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);">Role</th>
            <th style="text-align:left;padding:8px 0;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);">Joined</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${members.map(m => `
            <tr style="border-bottom:1px solid var(--border);" data-id="${m.id}">
              <td style="padding:12px 0;font-size:13px;font-weight:500;">
                <span ${isAdmin && m.role !== 'admin' ? 'contenteditable="true"' : ''}
                      class="editable-name"
                      data-id="${m.id}"
                      data-orig="${esc(m.full_name)}"
                      style="padding:2px 4px;border-radius:3px;outline:none;${isAdmin && m.role !== 'admin' ? 'cursor:text;' : ''}"
                >${esc(m.full_name)}</span>${m.id === me.id ? ' <span style="font-size:11px;color:var(--text-muted);">(you)</span>' : ''}
              </td>
              <td style="padding:12px 0;font-size:13px;color:var(--text-muted);">${esc(m.email)}</td>
              <td style="padding:12px 0;font-size:12px;">
                <span style="padding:2px 8px;border-radius:10px;font-weight:500;background:${m.role==='admin'?'#dbeafe':'#f1f5f9'};color:${m.role==='admin'?'#1d4ed8':'#475569'};">
                  ${m.role}
                </span>
              </td>
              <td style="padding:12px 0;font-size:12px;color:var(--text-muted);">${new Date(m.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</td>
              <td style="padding:12px 0;text-align:right;">
                ${isAdmin && m.role !== 'admin' ? `<button class="btn btn-ghost remove-btn" data-id="${m.id}" style="font-size:12px;color:var(--error);">Remove</button>` : ''}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;

    el.querySelectorAll('.editable-name[contenteditable="true"]').forEach(span => {
      span.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); span.blur(); } });
      span.addEventListener('blur', async () => {
        const newName = span.textContent.trim();
        if (!newName || newName === span.dataset.orig) { span.textContent = span.dataset.orig; return; }
        const res = await fetch(`/api/investor/team/${span.dataset.id}`, {
          method:'PUT', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ full_name: newName })
        });
        if (res.ok) { span.dataset.orig = newName; showGlobal('Name updated.', 'success'); }
        else { span.textContent = span.dataset.orig; showGlobal('Failed to update name.', 'error'); }
      });
    });

    el.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Remove this designee from the account?')) return;
        const res = await fetch(`/api/investor/team/${btn.dataset.id}`, { method:'DELETE' });
        if (res.ok) { btn.closest('tr').remove(); showGlobal('Designee removed.', 'success'); }
        else { const d=await res.json(); showGlobal(d.error,'error'); }
      });
    });
  }

  document.getElementById('show-add-btn').addEventListener('click', () => {
    document.getElementById('add-form').style.display = 'block';
    document.getElementById('show-add-btn').style.display = 'none';
  });
  document.getElementById('cancel-add-btn').addEventListener('click', () => {
    document.getElementById('add-form').style.display = 'none';
    document.getElementById('show-add-btn').style.display = '';
    document.getElementById('add-alert').style.display = 'none';
  });

  document.getElementById('add-btn').addEventListener('click', async () => {
    const name = document.getElementById('nu-name').value.trim();
    const email = document.getElementById('nu-email').value.trim();
    const password = document.getElementById('nu-password').value;
    if (!name || !email || !password) { showAddAlert('All fields required.'); return; }

    const res = await fetch('/api/investor/team', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ full_name: name, email, password })
    });
    const data = await res.json();
    if (!res.ok) { showAddAlert(data.error); return; }

    document.getElementById('add-form').style.display = 'none';
    document.getElementById('show-add-btn').style.display = '';
    ['nu-name','nu-email','nu-password'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('add-alert').style.display = 'none';

    const r = await fetch('/api/investor/team');
    renderMembers(await r.json());
    showGlobal(`${name} added as a designee.`, 'success');
  });

  function showGlobal(msg, type) {
    const el = document.getElementById('alert-global');
    el.className = `alert alert-${type}`; el.textContent = msg; el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }
  function showAddAlert(msg) {
    const el = document.getElementById('add-alert');
    el.className = 'alert alert-error'; el.textContent = msg; el.style.display = 'block';
  }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  document.getElementById('logout-btn').addEventListener('click', async () => {
    try { await fetch('/api/investor/logout', { method:'POST' }); } catch {}
    location.href = '/investor.html';
  });

  init();
</script>
<script src="/inactivity.js"></script>
</body>
</html>
